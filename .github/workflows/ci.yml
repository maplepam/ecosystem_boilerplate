name: CI

on:
  push:
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      # Submodules: platform (GitHub), auth + emp_ai_ds (Bitbucket). SSH keys below.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add Git hosts to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ecdsa,ed25519 bitbucket.org github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BITBUCKET_SSH_PRIVATE_KEY }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITHUB_SSH_PRIVATE_KEY }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Workspace + Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Verify generated mini-app catalog
        run: dart run tool/generate_miniapps.dart

      - name: Analyze packages
        run: dart run melos exec --concurrency 1 --fail-fast --dir-exists=lib -- "flutter analyze ."

      - name: Test boilerplate app
        run: |
          cd apps/emp_ai_boilerplate_app
          flutter test
