name: emp_ai_boilerplate_app
description: Sample host app wiring emp_ai_core, emp_ai_ds_northstar, emp_ai_foundation, and optional emp_ai_auth.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  meta: ^1.11.0
  dartz: ^0.10.1
  app_links: ^6.4.0
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^13.2.5
  shared_preferences: ^2.5.3

  emp_ai_app_shell:
    path: ../../packages/emp_ai_app_shell
  emp_ai_core:
    path: ../../packages/emp_ai_core
  emp_ai_ds_northstar:
    path: ../../packages/emp_ai_ds_northstar
  emp_ai_ds_widgets:
    path: ../../packages/emp_ai_ds_widgets
  emp_ai_foundation:
    path: ../../packages/emp_ai_foundation

  # Path to packages/emp_ai_auth — populated by `melos bootstrap` (clone hook) or submodule.
  emp_ai_auth:
    path: ../../packages/emp_ai_auth
  cached_query: ^3.5.1
  cached_query_flutter: ^3.3.6
  mixpanel_flutter: ^2.5.0
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  flutter_local_notifications: ^20.1.0
  firebase_messaging: ^16.1.3
  oauth2: ^2.0.3
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0

  # Pinned for emp_ai_ds (transitive Lucide). 3.1.11 variable fonts omit glyphs present
  # in lucide.ttf only → release web icon subsetting fails (e.g. CP 58205 / flipHorizontal*).
  lucide_icons_flutter: ^3.1.12

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
