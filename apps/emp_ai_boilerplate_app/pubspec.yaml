name: emp_ai_boilerplate_app
description: Sample host app wiring platform packages from ecosystem-platform + emp_ai_auth from Git.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.5 <4.0.0"

# Pin every `ref` below together when upgrading — see docs/meta/platform_bom.yaml
# Use the same commit SHA for all paths under ecosystem-platform (Pub unifies transitive path deps).
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  meta: ^1.11.0
  dartz: ^0.10.1
  app_links: ^6.4.0
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^13.2.5
  shared_preferences: ^2.5.3

  emp_ai_app_shell:
    git:
      url: git@github.com:maplepam/ecosystem-platform.git
      path: packages/emp_ai_app_shell
      ref: fa051d9bbb71a8dc196c6984aab189e6d33f7e0e
  emp_ai_core:
    git:
      url: git@github.com:maplepam/ecosystem-platform.git
      path: packages/emp_ai_core
      ref: fa051d9bbb71a8dc196c6984aab189e6d33f7e0e
  emp_ai_ds_northstar:
    git:
      url: git@github.com:maplepam/ecosystem-platform.git
      path: packages/emp_ai_ds_northstar
      ref: fa051d9bbb71a8dc196c6984aab189e6d33f7e0e
  emp_ai_ds_widgets:
    git:
      url: git@github.com:maplepam/ecosystem-platform.git
      path: packages/emp_ai_ds_widgets
      ref: fa051d9bbb71a8dc196c6984aab189e6d33f7e0e
  emp_ai_foundation:
    git:
      url: git@github.com:maplepam/ecosystem-platform.git
      path: packages/emp_ai_foundation
      ref: fa051d9bbb71a8dc196c6984aab189e6d33f7e0e

  # Separate auth repo; branch must declare emp_ai_ds via Git (ref: myemapta_main) — no local patch.
  emp_ai_auth:
    git:
      url: git@bitbucket.org:empowerteams/emp-ai-flutter-auth.git
      ref: 2b521403765a135d5dbf67d36c9e55ddf3b016f1

  cached_query: ^3.5.1
  cached_query_flutter: ^3.3.6
  mixpanel_flutter: ^2.5.0
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  flutter_local_notifications: ^20.1.0
  firebase_messaging: ^16.1.3
  oauth2: ^2.0.3
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0

  # Pinned for emp_ai_ds (transitive via emp_ai_auth). 3.1.11 variable fonts omit glyphs present
  # in lucide.ttf only → release web icon subsetting fails (e.g. CP 58205 / flipHorizontal*).
  lucide_icons_flutter: ^3.1.12

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
