name: emp_ai_ecosystem
repository: null

# Platform packages live in ecosystem-platform; this repo is the host app only.
packages:
  - apps/**

scripts:
  extract:fig-meta:
    description: Read meta.json from a .fig ZIP (canvas background hex)
    run: dart run tool/extract_fig_meta.dart

  generate:miniapps:
    description: Regenerate miniapp_catalog.g.dart from miniapps_registry.yaml
    run: dart run tool/generate_miniapps.dart

  create:miniapp:
    description: >
      Scaffold domain/data/presentation + append registry.
      Usage melos run create:miniapp -- my_snake_name
    run: dart run tool/create_miniapp.dart

  analyze:all:
    description: Run flutter analyze on every package that has lib/
    run: dart run melos exec --concurrency 1 --fail-fast -- "flutter analyze ."
    packageFilters:
      dirExists: lib

  test:boilerplate:
    description: Widget tests for emp_ai_boilerplate_app
    run: dart run melos exec --concurrency 1 -- "flutter test"
    packageFilters:
      scope: emp_ai_boilerplate_app

  bump:platform-refs:
    description: >
      Bump ecosystem-platform Git SHA in pubspec, BOM, doc examples; optional --auth-sha= for
      auth-only when BOM uses a 40-char auth ref; then flutter pub get. Pass flags after --. Examples:
      melos run bump:platform-refs -- <platform-sha> [--auth-sha=...] [--dry-run]
      melos run bump:platform-refs -- --auth-sha=<new-auth-sha>
    run: dart run tool/bump_platform_refs.dart

  sync:northstar-dtcg:
    description: >
      Regenerate ecosystem-platform northstar_base_tokens.dart from Figma DTCG JSON
      (Light / Dark / White Labeled). Pass paths after --. Example:
      melos run sync:northstar-dtcg -- --light=./Light.tokens.json --dark=./Dark.tokens.json
      --white-labeled="./White Labeled.tokens.json" [--output=...] [--dry-run]
    run: dart run tool/sync_northstar_base_tokens_from_dtcg.dart

ide:
  intellij: false
