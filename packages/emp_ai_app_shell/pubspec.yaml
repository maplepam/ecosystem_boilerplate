  Complements emp_ai_core routing primitives.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.5 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  emp_ai_foundation:
    path: ../emp_ai_foundation
  flutter:
    sdk: flutter
  go_router: ^13.2.5

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
