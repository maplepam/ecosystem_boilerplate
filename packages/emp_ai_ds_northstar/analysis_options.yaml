include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # material_color_utilities is SDK-pinned by flutter; a direct constraint fights
    # pub across Flutter versions (e.g. 0.11.1 vs 0.13.0). Showcase imports use the transitive package.
    depend_on_referenced_packages: ignore

linter:
  rules:
    prefer_const_constructors: true
