name: emp_ai_ds_northstar
description: >
  Northstar V3 design tokens, theming, and bundled SVG icons
  (`assets/northstar_icons/`). No networking or feature widgets. Map colors
  from Figma into [NorthstarColorTokens].
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.5 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flex_seed_scheme: ^3.5.1
  meta: ^1.16.0

flutter:
  assets:
    - assets/northstar_icons/

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
