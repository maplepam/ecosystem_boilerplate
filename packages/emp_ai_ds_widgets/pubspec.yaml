name: emp_ai_ds_widgets
description: >
  Northstar-styled reusable UI (navigation drawer, etc.) built on
  emp_ai_ds_northstar tokens. No auth or networking.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.5 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dart_quill_delta: ^10.8.3
  emp_ai_ds_northstar:
    path: ../emp_ai_ds_northstar
  go_router: ^13.2.5
  meta: ^1.16.0
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
