  emp_ai_ds_northstar tokens. No auth or networking.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.5 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  emp_ai_ds_northstar:
    path: ../emp_ai_ds_northstar
  go_router: ^13.2.5
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
